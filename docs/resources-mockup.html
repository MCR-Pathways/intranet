<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resources Redesign — Sidebar Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F2F4F7;--card:#fff;--border:#e5e7eb;--input:#e5e7eb;
  --primary:#213350;--primary-fg:#fff;
  --foreground:#213350;--muted:#F0F2F5;--muted-fg:#6b7280;
  --teal:#2A6075;--wine:#751B48;--pink:#DA417C;
  --icon-teal:#2A6075;--icon-green:#4A7A00;--icon-orange:#9E5B00;
  --icon-wine:#751B48;--icon-lb:#1A6E8E;--icon-pink:#DA417C;
  --radius:0.75rem;
  --shadow:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#111827;color:var(--foreground);line-height:1.5;font-size:14px;-webkit-font-smoothing:antialiased}

/* ===== CONTROL BAR ===== */
.ctrl{position:fixed;bottom:0;left:0;right:0;z-index:900;background:#111827;display:flex;align-items:center;gap:16px;padding:8px 20px;flex-wrap:wrap;border-top:1px solid #333}
.ctrl-sec{display:flex;align-items:center;gap:6px}
.ctrl-lbl{color:rgba(255,255,255,.4);font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;white-space:nowrap}
.ctrl-pills{display:flex;gap:1px;background:rgba(255,255,255,.08);border-radius:6px;padding:2px}
.ctrl-btn{padding:5px 12px;font-size:11px;border:none;background:transparent;color:rgba(255,255,255,.5);cursor:pointer;border-radius:4px;font-weight:500;white-space:nowrap;transition:all .15s}
.ctrl-btn.active{background:rgba(255,255,255,.18);color:#fff}
.ctrl-btn:hover:not(.active){color:rgba(255,255,255,.8)}

/* ===== APP SHELL ===== */
.app{width:100%;max-width:1440px;margin:0 auto 48px;background:var(--bg);overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,.5);min-height:calc(100vh - 48px)}
.app-header{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;height:64px}
.header-left{display:flex;align-items:center;gap:16px}
.hamburger{background:none;border:none;cursor:pointer;padding:8px;margin-left:12px;border-radius:8px;color:var(--foreground);display:flex;align-items:center}
.hamburger:hover{background:var(--muted)}
.logo-link{display:flex;align-items:center;margin-left:4px}
.logo-link svg{height:36px;width:auto}
.header-right{display:flex;align-items:center;gap:8px;padding-right:24px}
.bell-btn{background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;color:var(--foreground);display:flex;align-items:center;position:relative}
.bell-btn:hover{background:var(--muted)}
.bell-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:#ef4444;border:2px solid var(--card)}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--primary);color:var(--primary-fg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer}

/* ===== APP SIDEBAR ===== */
.app-body{display:flex;min-height:calc(100vh - 64px - 48px)}
.sidebar{width:256px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:8px;font-size:14px;font-weight:500;color:rgba(33,51,80,.7);text-decoration:none;transition:all .15s;cursor:pointer}
.nav-item:hover{background:var(--muted);color:var(--foreground)}
.nav-item.active{background:var(--primary);color:var(--primary-fg)}
.nav-item svg{width:20px;height:20px;flex-shrink:0}
.sidebar-footer{border-top:1px solid var(--border);padding:12px}
.sidebar-footer .nav-item{margin-bottom:2px}
.sidebar-label{padding:8px 12px 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted-fg)}

/* ===== MAIN CONTENT ===== */
.content{flex:1;padding:24px 32px;display:flex;flex-direction:column;min-width:0;overflow-y:auto}

/* Breadcrumbs */
.bc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.breadcrumbs{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--muted-fg)}
.breadcrumbs a{color:var(--muted-fg);text-decoration:none;transition:color .15s}
.breadcrumbs a:hover{color:var(--foreground);text-decoration:underline;text-underline-offset:4px}
.breadcrumbs .sep{color:rgba(107,114,128,.5);user-select:none}
.breadcrumbs .cur{color:var(--foreground);font-weight:500}

/* Edit pencil toggle */
.edit-pencil{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;color:var(--muted-fg)}
.edit-pencil:hover{background:var(--muted);color:var(--foreground)}
.edit-pencil.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.edit-pencil svg{width:16px;height:16px}

/* Page header (landing only) */
.pg-hdr{margin-bottom:4px}
.pg-title{font-size:28px;font-weight:700;letter-spacing:-.01em}
.pg-sub{color:var(--muted-fg);margin-top:2px;font-size:14px}

/* Admin bar */
.admin-bar{display:flex;align-items:center;justify-content:flex-end;background:var(--card);border-radius:var(--radius);padding:10px 16px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid var(--border);gap:8px}

/* New dropdown */
.new-dropdown{position:relative;display:inline-block}
.new-menu{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.1);min-width:160px;z-index:10;padding:4px}
.new-menu.show{display:block}
.new-menu-item{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:13px;font-weight:500;color:var(--foreground);cursor:pointer;border-radius:6px;border:none;background:none;width:100%;text-align:left;transition:background .15s}
.new-menu-item:hover{background:var(--muted)}
.new-menu-item svg{width:16px;height:16px;color:var(--muted-fg)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all .15s;text-decoration:none}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-primary{background:var(--primary);color:var(--primary-fg)}
.btn-primary:hover{opacity:.9}
.btn-ghost{background:transparent;color:var(--foreground);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--muted)}
.btn-action{background:var(--pink);color:#fff}
.btn-action:hover{opacity:.9}
.btn svg{width:16px;height:16px}
.btn-sm svg{width:14px;height:14px}

/* ===== RESOURCE PANEL (Tree + Content) ===== */
.res-panel{display:flex;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-md);overflow:hidden;flex:1;min-height:0}

/* Resource Tree */
.res-tree{width:280px;border-right:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;transition:width .2s ease}
.res-tree.collapsed{width:52px}
.tree-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);gap:4px}
.tree-header-actions{display:flex;align-items:center;gap:2px}
.tree-hdr-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--muted-fg);display:flex;align-items:center;transition:all .15s}
.tree-hdr-btn:hover{background:var(--muted);color:var(--foreground)}
.tree-hdr-btn svg{width:16px;height:16px}
.tree-hdr-btn.active{color:var(--teal)}
.tree-items{flex:1;padding:8px 0;overflow-y:auto}
.tree-cat{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;user-select:none}
.tree-cat:hover{background:var(--muted)}
.tree-cat.active{border-left-color:var(--teal);background:rgba(42,96,117,.05)}
.tree-cat.active .tree-cat-name{color:var(--teal);font-weight:600}
.tree-cat-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tree-cat-icon svg{width:16px;height:16px}
.tree-cat-name{flex:1;font-size:13px;font-weight:500;color:rgba(33,51,80,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-cat .tree-chev{width:14px;height:14px;color:var(--muted-fg);transition:transform .2s;flex-shrink:0}
.tree-cat.expanded .tree-chev{transform:rotate(90deg)}
.tree-subs{border-left:2px solid rgba(42,96,117,.15);margin-left:28px;padding-left:0}
.tree-sub{display:block;padding:6px 14px;font-size:13px;color:var(--muted-fg);cursor:pointer;transition:all .15s;text-decoration:none;border-radius:0 6px 6px 0}
.tree-sub:hover{color:var(--foreground);background:var(--muted)}
.tree-sub.active{color:var(--teal);font-weight:600;background:rgba(42,96,117,.06)}

/* Collapsed tree */
.res-tree.collapsed .tree-header-actions .tree-hdr-btn:not(.collapse-btn){display:none}
.res-tree.collapsed .tree-cat{padding:8px 0;justify-content:center;border-left:none}
.res-tree.collapsed .tree-cat-name,.res-tree.collapsed .tree-chev,.res-tree.collapsed .tree-subs{display:none}
.res-tree.collapsed .tree-cat.active{background:rgba(42,96,117,.05);border-radius:8px;margin:0 6px}

/* Icon box colours */
.ib-teal{background:rgba(42,96,117,.12);color:var(--icon-teal)}
.ib-wine{background:rgba(117,27,72,.12);color:var(--icon-wine)}
.ib-orange{background:rgba(158,91,0,.12);color:var(--icon-orange)}
.ib-green{background:rgba(74,122,0,.12);color:var(--icon-green)}
.ib-lb{background:rgba(26,110,142,.12);color:var(--icon-lb)}
.ib-pink{background:rgba(218,65,124,.12);color:var(--icon-pink)}
.ib-navy{background:rgba(33,51,80,.1);color:var(--primary)}
.ib-grey{background:var(--muted);color:var(--muted-fg)}

/* ===== CONTENT PANEL ===== */
.res-content{flex:1;padding:24px 28px;overflow-y:auto;min-width:0}

/* Hero search */
.hero-search{position:relative;margin-bottom:24px}
.hero-search svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:var(--muted-fg)}
.hero-search input{width:100%;padding:14px 16px 14px 48px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);font-size:15px;color:var(--foreground);font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
.hero-search input::placeholder{color:var(--muted-fg)}
.hero-search input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(33,51,80,.1)}

/* Section label */
.sec-lbl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted-fg);margin-bottom:12px}

/* Featured cards */
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.feat-card{display:flex;align-items:center;gap:12px;padding:14px;border-radius:10px;border:1px solid var(--border);background:var(--card);text-decoration:none;color:var(--foreground);transition:all .15s;cursor:pointer}
.feat-card:hover{border-color:rgba(33,51,80,.3);box-shadow:var(--shadow)}
.feat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.feat-icon svg{width:16px;height:16px}
.feat-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feat-sub{font-size:11px;color:var(--muted-fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Recently updated / Article list */
.art-list{display:flex;flex-direction:column}
.art-row{display:flex;align-items:center;padding:12px 14px;border-radius:8px;text-decoration:none;color:var(--foreground);transition:background .15s;cursor:pointer;gap:12px}
.art-row:hover{background:var(--muted)}
.art-row-icon{color:var(--muted-fg);flex-shrink:0}
.art-row-icon svg{width:18px;height:18px}
.art-row-body{flex:1;min-width:0}
.art-row-title{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.art-row-meta{font-size:12px;color:var(--muted-fg);margin-top:1px}
.art-row-arrow{color:var(--muted-fg);flex-shrink:0}
.art-row-arrow svg{width:16px;height:16px}
.art-row-gdocs{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--teal);background:rgba(42,96,117,.08);padding:1px 6px;border-radius:4px}
.art-row-gdocs svg{width:10px;height:10px}
.art-kebab{background:none;border:none;padding:4px;border-radius:6px;cursor:pointer;color:var(--muted-fg);opacity:0;transition:opacity .15s;flex-shrink:0}
.art-row:hover .art-kebab{opacity:1}
.art-kebab:hover{background:var(--muted);color:var(--foreground)}
.art-kebab svg{width:16px;height:16px}

/* Category header (inside content panel) */
.cat-hdr{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.cat-hdr-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cat-hdr-icon svg{width:22px;height:22px}
.cat-hdr h2{font-size:22px;font-weight:700;letter-spacing:-.01em}
.cat-hdr p{font-size:13px;color:var(--muted-fg);margin-top:2px}

/* Subcategory cards in category view */
.subcat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:24px}
.subcat-card{padding:14px 16px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .15s;text-decoration:none;color:var(--foreground)}
.subcat-card:hover{border-color:rgba(33,51,80,.3);box-shadow:var(--shadow)}
.subcat-card-name{font-size:13px;font-weight:600}
.subcat-card-count{font-size:12px;color:var(--muted-fg);margin-top:2px}

/* Article view */
.article-wrap{max-width:720px}
.gdocs-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(42,96,117,.06);border:1px solid rgba(42,96,117,.15);border-radius:var(--radius);padding:12px 20px;margin-bottom:20px}
.gdocs-bar-left{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--teal)}
.gdocs-bar-left svg{width:16px;height:16px}
.article-h1{font-size:26px;font-weight:700;letter-spacing:-.01em}
.article-meta{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:13px;color:var(--muted-fg);flex-wrap:wrap}
.article-meta .dot{color:var(--border)}
.article-body{margin-top:20px;line-height:1.8;font-size:15px}
.article-body h2{font-size:18px;font-weight:600;margin:24px 0 10px;color:var(--foreground)}
.article-body h2:first-child{margin-top:0}
.article-body p{margin-bottom:14px;color:rgba(33,51,80,.85)}
.article-body ul{margin-bottom:14px;padding-left:24px}
.article-body li{margin-bottom:4px;color:rgba(33,51,80,.85)}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-state-icon{width:56px;height:56px;border-radius:50%;background:var(--muted);display:flex;align-items:center;justify-content:center;margin-bottom:16px;color:var(--muted-fg)}
.empty-state-icon svg{width:24px;height:24px}
.empty-state h3{font-size:16px;font-weight:600;margin-bottom:4px}
.empty-state p{font-size:13px;color:var(--muted-fg);max-width:280px;margin-bottom:16px}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-count{background:#EFF6FF;color:#1D4ED8}
</style>
</head>
<body>

<!-- CONTROL BAR -->
<div class="ctrl">
  <div class="ctrl-sec">
    <span class="ctrl-lbl">View</span>
    <div class="ctrl-pills">
      <button class="ctrl-btn active" onclick="setView('landing')">Landing</button>
      <button class="ctrl-btn" onclick="setView('category')">Category</button>
      <button class="ctrl-btn" onclick="setView('flat')">Flat Category</button>
      <button class="ctrl-btn" onclick="setView('article')">Article</button>
    </div>
  </div>
  <div class="ctrl-sec">
    <span class="ctrl-lbl">User</span>
    <div class="ctrl-pills">
      <button class="ctrl-btn active" onclick="setUser('staff')">Staff</button>
      <button class="ctrl-btn" onclick="setUser('external')">External</button>
    </div>
  </div>
  <div class="ctrl-sec">
    <span class="ctrl-lbl">Editor</span>
    <div class="ctrl-pills">
      <button class="ctrl-btn active" onclick="setEditor(false)">Off</button>
      <button class="ctrl-btn" onclick="setEditor(true)">On</button>
    </div>
  </div>
</div>

<!-- APP SHELL -->
<div class="app">
  <header class="app-header">
    <div class="header-left">
      <button class="hamburger">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      </button>

function syncCtrl(){
  const keys=[['landing','category','flat','article'],['staff','external'],[false,true]];

  document.querySelectorAll('.ctrl-sec').forEach((sec,si)=>{

function renderTree(){

  let h=`<div class="res-tree${collapsed?' collapsed':''}">`;
  // Tree header with expand/collapse all + collapse toggle
  const allExpanded=CATS.every((_,i)=>!CATS[i].subs.length||S.expanded.has(i));
  h+='<div class="tree-header">';
  if(!collapsed){
    h+='<div class="tree-header-actions">';
    if(allExpanded){
      h+=`<button class="tree-hdr-btn" onclick="collapseAll()" title="Collapse all">${svg('fold',16)}</button>`;
    } else {
      h+=`<button class="tree-hdr-btn" onclick="expandAll()" title="Expand all">${svg('unfold',16)}</button>`;
    }
    h+='</div>';
  } else {
    h+='<div></div>';
  }
  h+=`<button class="tree-hdr-btn collapse-btn" onclick="toggleTreeCollapse()" title="${collapsed?'Expand tree':'Collapse tree'}">${svg(collapsed?'chevRight':'chevLeft',16)}</button>`;
  h+='</div>';
  h+='<div class="tree-items">';
  CATS.forEach((cat,i)=>{
    const hasSubs=cat.subs.length>0;
    const isExpanded=S.expanded.has(i);
    let isActive=false;
    if(S.view==='category'&&i===0) isActive=true;
    if(S.view==='flat'&&i===6) isActive=true;
    if(S.view==='article'&&i===0) isActive=true;
    const cls=['tree-cat'];
    if(isActive) cls.push('active');
    if(isExpanded&&hasSubs&&!collapsed) cls.push('expanded');
    const chev=hasSubs&&!collapsed?`<span class="tree-chev">${svg('chevRight',14)}</span>`:'';
    h+=`<div class="${cls.join(' ')}" onclick="${collapsed?'expandTreeAndNav('+i+')':'toggleCat('+i+')'}">
      <div class="tree-cat-icon ${cat.c}">${svg(cat.icon,16)}</div>
      <span class="tree-cat-name">${cat.name}</span>${chev}</div>`;
    if(hasSubs&&isExpanded&&!collapsed){
      h+='<div class="tree-subs">';
      cat.subs.forEach((sub,si)=>{
        let subActive=false;
        if((S.view==='category'||S.view==='article')&&i===0&&si===0) subActive=true;
        h+=`<a class="tree-sub${subActive?' active':''}" href="#">${sub.name}</a>`;
      });
      h+='</div>';
    }
  });
  h+='</div></div>';
  return h;
}
function toggleCat(i){
  if(S.expanded.has(i)) S.expanded.delete(i);
  else S.expanded.add(i);
  render();
}
function expandAll(){
  CATS.forEach((_,i)=>{if(CATS[i].subs.length) S.expanded.add(i)});
  render();
}
function collapseAll(){
  S.expanded.clear();
  render();
}
function toggleTreeCollapse(){
  S.treeCollapsed=!S.treeCollapsed;
  render();
}
function expandTreeAndNav(i){
  S.treeCollapsed=false;
  S.expanded.add(i);
  render();
}

// ===== CONTENT PANEL =====
function renderContent(){
  let h='<div class="res-content">';
  if(S.view==='landing') h+=contentLanding();
  else if(S.view==='category') h+=contentCategory();
  else if(S.view==='flat') h+=contentFlat();
  else h+=contentArticle();
  h+='</div>';
  return h;
}

function contentLanding(){
  let h='';
  h+=`<div class="hero-search">${svg('search')}<input placeholder="Search all resources..." /></div>`;
  h+='<div class="sec-lbl">Key Resources</div><div class="feat-grid">';
  FEATURED.forEach(f=>{
    h+=`<a class="feat-card" href="#"><div class="feat-icon ${f.c}">${svg(f.icon,16)}</div><div style="min-width:0"><div class="feat-title">${f.title}</div><div class="feat-sub">${f.cat}</div></div></a>`;
  });
  h+='</div>';
  h+='<div class="sec-lbl">Recently Updated</div><div class="art-list">';
  RECENT.forEach(r=>{
    h+=`<a class="art-row" href="#">
      <div class="art-row-icon">${svg('fileText',18)}</div>
      <div class="art-row-body"><div class="art-row-title">${r.title}</div><div class="art-row-meta">${r.cat} &middot; ${r.time}</div></div>
      <div class="art-row-arrow">${svg('chevRight',16)}</div>
    </a>`;
  });
  h+='</div>';
  return h;
}

function contentCategory(){
  const cat=CATS[0];
  let h='';
  h+=`<div class="cat-hdr"><div class="cat-hdr-icon ${cat.c}">${svg(cat.icon,22)}</div><div><h2>${cat.name}</h2><p>${cat.desc}</p></div></div>`;
  h+='<div class="sec-lbl">Subcategories</div><div class="subcat-grid">';
  cat.subs.forEach(s=>{
    h+=`<a class="subcat-card" href="#"><div class="subcat-card-name">${s.name}</div><div class="subcat-card-count">${s.count} articles</div></a>`;
  });
  h+='</div>';
  h+=`<div class="sec-lbl">Employment Policies <span class="badge badge-count" style="margin-left:6px">${ARTICLES.length}</span></div>`;
  h+=articleList(ARTICLES);
  return h;
}

function contentFlat(){
  const cat=CATS[6];
  let h='';
  h+=`<div class="cat-hdr"><div class="cat-hdr-icon ${cat.c}">${svg(cat.icon,22)}</div><div><h2>${cat.name}</h2><p>${cat.desc}</p></div></div>`;
  h+=`<div class="sec-lbl">All Articles <span class="badge badge-count" style="margin-left:6px">${ORG_ARTICLES.length}</span></div>`;
  h+=articleList(ORG_ARTICLES);
  return h;
}

function contentArticle(){
  let h='<div class="article-wrap">';
  if(S.editor){
    h+=`<div class="gdocs-bar"><div class="gdocs-bar-left">${svg('extLink',16)} This article is synced from Google Docs</div><button class="btn btn-sm btn-action">${svg('extLink',14)} Open in Google Docs</button></div>`;
  }
  h+=`<h1 class="article-h1">Annual Leave Policy</h1>`;
  h+=`<div class="article-meta"><span>Policies & Compliance</span><span class="dot">&middot;</span><span>Updated 12 Mar 2026</span><span class="dot">&middot;</span><span>5 min read</span></div>`;
  h+=`<div class="article-body">
    <h2>1. Purpose</h2>
    <p>This policy outlines the annual leave entitlement and procedures for all MCR Pathways staff members. It applies to permanent, fixed-term, and part-time employees.</p>
    <h2>2. Entitlement</h2>
    <p>Full-time staff are entitled to 28 days of annual leave per year (inclusive of public holidays). Part-time staff receive a pro-rata entitlement based on their contracted hours.</p>
    <ul>
      <li>Leave year runs from 1 April to 31 March</li>
      <li>New starters receive pro-rata entitlement from their start date</li>
      <li>Up to 5 unused days may be carried forward with line manager approval</li>
    </ul>
    <h2>3. Requesting Leave</h2>
    <p>All leave requests must be submitted through the HR system at least two weeks in advance. Line managers should respond within three working days. During peak periods (school holidays), early booking is encouraged.</p>
    <h2>4. Approval</h2>
    <p>Line managers are responsible for approving leave requests, ensuring adequate team coverage. Requests during blackout periods may be declined. Appeals can be raised with the HR team.</p>
  </div>`;
  h+='</div>';
  return h;
}

function articleList(articles){
  let h='<div class="art-list" style="background:var(--bg);border-radius:8px;padding:4px">';
  articles.forEach(a=>{
    const gdocs=S.editor&&a.gdocs?`<span class="art-row-gdocs">${svg('extLink',10)} Google Docs</span>`:'';
    const kebab=S.editor?`<button class="art-kebab">${svg('moreH',16)}</button>`:'';
    h+=`<a class="art-row" href="#" ${S.view!=='article'?'onclick="setView(\'article\');return false"':''}>
      <div class="art-row-icon">${svg('fileText',18)}</div>
      <div class="art-row-body"><div class="art-row-title">${a.title}${gdocs}</div><div class="art-row-meta">Updated ${a.updated}</div></div>
      ${kebab}
      <div class="art-row-arrow">${svg('chevRight',16)}</div>
    </a>`;
  });
  h+='</div>';
  return h;
}

function emptyState(){
  return`<div class="empty-state">
    <div class="empty-state-icon">${svg('folderOpen',24)}</div>
    <h3>No articles yet</h3>
    <p>Link a Google Doc to help your team find what they need.</p>
    ${S.editor?'<button class="btn btn-primary">'+svg('extLink',16)+' Link Google Doc</button>':''}
  </div>`;
}

// Close dropdown on outside click
document.addEventListener('click',e=>{
  if(S.newMenuOpen&&!e.target.closest('.new-dropdown')){S.newMenuOpen=false;render()}
});

// Init
S.expanded.add(0);
render();
</script>
</body>
</html>
